<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    h1 {
      text-align: center;
    }
    form {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    input, button {
      padding: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
      cursor: pointer;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    tr:hover {
      background-color: #ddd;
    }
    .sort-indicator {
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <h1>Quản lý Sản phẩm</h1>

  <form id="add-form">
    <input type="text" id="input-name" placeholder="Tên sản phẩm" required>
    <input type="text" id="input-category" placeholder="Danh mục">
    <input type="number" id="input-price" placeholder="Đơn giá" min="0" required>
    <input type="number" id="input-quantity" placeholder="Số lượng" min="1" required>
    <button type="button" id="btn-add">Thêm sản phẩm</button>
  </form>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="name-header">Tên sản phẩm <span class="sort-indicator"></span></th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody>
      
    </tbody>
  </table>

  <script>
    let products = [];
    let sortAscending = true;

    
    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function() {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        renderTable();
      }
    };
    xhr.open('GET', 'products.json');
    xhr.send();

    
    function renderTable() {
      const tbody = document.querySelector('#product-table tbody');
      tbody.innerHTML = '';
      products.forEach((product, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price.toLocaleString()}</td>
          <td>${product.quantity}</td>
        `;
        tbody.appendChild(row);
      });
    }

   
    document.getElementById('name-header').addEventListener('click', function() {
      products.sort((a, b) => {
        const nameA = a.name.toLowerCase();
        const nameB = b.name.toLowerCase();
        if (sortAscending) {
          return nameA.localeCompare(nameB);
        } else {
          return nameB.localeCompare(nameA);
        }
      });
      sortAscending = !sortAscending;
      updateSortIndicator();
      renderTable();
    });

   
    function updateSortIndicator() {
      const indicator = document.querySelector('.sort-indicator');
      indicator.textContent = sortAscending ? '▲' : '▼';
    }

    
    document.getElementById('btn-add').addEventListener('click', function() {
      const name = document.getElementById('input-name').value.trim();
      const category = document.getElementById('input-category').value.trim();
      const price = parseFloat(document.getElementById('input-price').value);
      const quantity = parseInt(document.getElementById('input-quantity').value);

      // Validation
      if (name.length < 3) {
        alert('Tên sản phẩm phải ít nhất 3 ký tự');
        return;
      }
      if (isNaN(price) || price <= 0) {
        alert('Đơn giá phải là số dương');
        return;
      }
      if (isNaN(quantity) || quantity < 1) {
        alert('Số lượng phải là số nguyên >= 1');
        return;
      }

      // Thêm sản phẩm mới
      const newProduct = {
        id: products.length + 1,
        name: name,
        category: category || 'Chưa phân loại',
        price: price,
        quantity: quantity
      };
      products.push(newProduct);
      renderTable();

      // Reset form
      document.getElementById('add-form').reset();
    });
  </script>
</body>
</html>
